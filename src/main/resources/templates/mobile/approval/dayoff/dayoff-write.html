<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset='utf-8'>
        <meta http-equiv='X-UA-Compatible' content='IE=edge'>
        <meta name='viewport' content='width=device-width, initial-scale=1'>

        <title>Dayoff write - Mobile</title>

        <link th:href="@{/css/styles.css}" rel="stylesheet">
        <link href="https://cdnjs.cloudflare.com/ajax/libs/tempusdominus-bootstrap-4/5.39.0/css/tempusdominus-bootstrap-4.min.css" integrity="sha512-3JRrEUwaCkFUBLK1N8HehwQgu8e23jTH4np5NHOmQOobuC4ROQxFwFgBLTnhcnQRMs84muMh0PnnwXlPq5MGjg==" crossorigin="anonymous" referrerpolicy="no-referrer" rel="stylesheet">
    </head>
    <body>
        <div class="container-fluid">
            <div class="mt-4 overflow-auto">
                <div class="card">
                    <th:block th:replace="mobile/common/docs-header :: docs-header-section"></th:block>

                    <div class="card-body">
                        <th:block th:replace="mobile/common/docs-title :: docs-title-section"></th:block>
                        <br>

                        <div id="dayoffRowSection">
                            <div class="dayoff-row" id="dayoffRow0">
                                <div class="form-row">
                                    <label class="col-3 col-form-label col-form-label-sm">구분</label>
                                    <div class="form-group col-9">
                                        <select class="form-control dayoff-code" id="codeSelector0">
                                            <option value="" selected disabled>휴가 선택</option>
                                            <option th:each="dayoff : ${dayoffList}" th:value="${dayoff.code}" th:text="${dayoff.value}"></option>
                                        </select>
                                    </div>
                                </div>

                                <div class="form-row">
                                    <label class="col-3 col-form-label col-form-label-sm">시작일</label>
                                    <div class="form-group col-9">
                                        <div class="input-group mr-2" data-target-input="nearest">
                                            <div class="input-group-prepend date-start-prepend" data-target="#dateStart0" data-toggle="datetimepicker">
                                                <div class="input-group-text"><i class="fas fa-calendar-day"></i></div>
                                            </div>
                                            <input type="text" class="form-control text-center datetimepicker-input input-date-start" id="dateStart0" data-toggle="datetimepicker" data-target="#dateStart0" autocomplete="off" onchange="ckeckDate(this)" inputmode="none">
                                        </div>
                                    </div>
                                </div>
        
                                <div class="form-row">
                                    <label class="col-3 col-form-label col-form-label-sm">종료일</label>
                                    <div class="form-group col-9">
                                        <div class="input-group mr-2" data-target-input="nearest">
                                            <div class="input-group-prepend date-end-prepend" data-target="#dateEnd0" data-toggle="datetimepicker">
                                                <div class="input-group-text"><i class="fas fa-calendar-day"></i></div>
                                            </div>
                                            <input type="text" class="form-control text-center datetimepicker-input input-date-end" id="dateEnd0" data-toggle="datetimepicker" data-target="#dateEnd0" autocomplete="off" onchange="ckeckDate(this)" inputmode="none">
                                        </div>
                                    </div>
                                </div>
                                <br>
                            </div>
                        </div>

                        <br>
                        <div class="form-row">
                            <div class="form-group col-4">
                                <button class="btn btn-outline-info btn-block" type="button" onclick="addRow()"><i class="fas fa-plus-square"></i></button>
                            </div>
                            <div class="form-group col-4">
                                <button class="btn btn-outline-secondary btn-block" type="button" onclick="removeRow()"><i class="fas fa-trash-alt"></i></button>
                            </div>
                            <div class="form-group col-4">
                                <button class="btn btn-outline-primary btn-block" type="button" onclick="openToPopup('/mobile/approval/common/approval/line')"><i class="fas fa-file-signature"></i></button>
                            </div>
                        </div>

                        <th:block th:replace="mobile/approval/common/approval-line-table :: approval-line-section"></th:block>
                    </div>
                </div>

            </div>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.slim.min.js" integrity="sha512-6ORWJX/LrnSjBzwefdNUyLCMTIsGoNP6NftMy2UAm1JBm6PRZCO1d7OHBStWpVFZLO+RerTvqX/Z9mBFfCJZ4A==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/js/all.min.js" integrity="sha512-Tn2m0TIpgVyTzzvmxLNuqbSJH3JP8jm+Cy3hvHrW7ndTDcJ1w5mBiksqDBb8GpE2ksktFvDB/ykZ0mDpsZj20w==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.6.0/js/bootstrap.bundle.min.js" integrity="sha512-wV7Yj1alIZDqZFCUQJy85VN+qvEIly93fIQAN7iqDFCPEucLCeNFz4r35FCo9s6WrpdDQPi80xbljXB8Bjtvcg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        
        <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/moment.min.js" integrity="sha512-qTXRIMyZIFb8iQcfjXWCO8+M5Tbc38Qi5WzdPOYZHIlZpzBHG3L3by84BBBOiRGiEb7KKtAOAs5qYdUiZiQNNQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        <script th:src="@{/js/common/set-moment-locale-ko.js}"></script>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/tempusdominus-bootstrap-4/5.39.0/js/tempusdominus-bootstrap-4.min.js" integrity="sha512-k6/Bkb8Fxf/c1Tkyl39yJwcOZ1P4cRrJu77p83zJjN2Z55prbFHxPs9vN7q3l3+tSMGPDdoH51AEU8Vgo1cgAA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

        <script th:src="@{/js/common/set-datetimepicker-default.js}"></script>

        <script th:src="@{/js/common/fetch-custom.js}"></script>
        <script th:src="@{/js/common/open-popup.js}"></script>

        <script th:src="@{/js/mobile/approval/common/line-table.js}"></script>

        <script th:src="@{/js/mobile/approval/dayoff/dayoff-sub.js}"></script>
        <script th:src="@{/js/mobile/approval/dayoff/dayoff-write.js}"></script>
    </body>
</html>
