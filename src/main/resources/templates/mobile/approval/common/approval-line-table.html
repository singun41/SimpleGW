<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <!-- 이 템플릿을 사용할 때 /js/approval/approval-line-table.js를 추가할 것. -->
    <th:block th:fragment="approval-line-section">
        <div class="form-row">
            <div class="form-group col-12">
                <div class="card mb-2">
                    <div class="card-header card-header-custom">
                        <label class="col-form-label col-form-label-sm text-muted"><i class="fas fa-file-signature custom-card-header-fas-icon-sm"></i>결재</label>
                    </div>
                    <div class="card-body" id="bodyApprover"></div>
                </div>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group col-12">
                <div class="card mb-2">
                    <div class="card-header card-header-custom">
                        <label class="col-form-label col-form-label-sm text-muted"><i class="fas fa-user-check custom-card-header-fas-icon-sm"></i>참조</label>
                    </div>
                    <div class="card-body" id="bodyReferrer"></div>
                </div>
            </div>
        </div>
    </th:block>
</html>
