<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

        <title>Simple GW - Mobile</title>
        
        <link rel="stylesheet" th:href="@{/css/styles.css}">
    </head>
    <body>
        <div class="container-fluid">
            <div class="card mt-4">
                <div class="card-header card-header-custom">
                    <label class="col-form-label col-form-label-card-header font-weight-bold text-muted">
                        <img src="/favicon.ico" style="height: 15%; width: 15%;" class="mr-2">Simple GW
                    </label>
                </div>
    
                <div class="card-body">
                    <div class="form-row">
                        <label class="col-6 col-form-label"><i class="fas fa-clipboard-list mr-2"></i>공지사항</label>
                        <div class="form-group col-6">
                            <a type="button" class="btn btn-outline-secondary btn-block" href="mobile/notice/listpage"><i class="fas fa-list"></i></a>
                        </div>
                    </div>
    
                    <div class="form-row">
                        <label class="col-6 col-form-label"><i class="fas fa-user-check mr-2"></i>휴가신청서</label>
                        <div class="form-group col-3">
                            <a type="button" class="btn btn-outline-secondary btn-block" href="mobile/approval/dayoff/listpage"><i class="fas fa-list"></i></a>
                        </div>
                        <div class="form-group col-3">
                            <a type="button" class="btn btn-outline-secondary btn-block" href="mobile/approval/dayoff/writepage"><i class="fas fa-edit"></i></a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.slim.min.js" integrity="sha512-6ORWJX/LrnSjBzwefdNUyLCMTIsGoNP6NftMy2UAm1JBm6PRZCO1d7OHBStWpVFZLO+RerTvqX/Z9mBFfCJZ4A==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/js/all.min.js" integrity="sha512-Tn2m0TIpgVyTzzvmxLNuqbSJH3JP8jm+Cy3hvHrW7ndTDcJ1w5mBiksqDBb8GpE2ksktFvDB/ykZ0mDpsZj20w==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.6.0/js/bootstrap.bundle.min.js" integrity="sha512-wV7Yj1alIZDqZFCUQJy85VN+qvEIly93fIQAN7iqDFCPEucLCeNFz4r35FCo9s6WrpdDQPi80xbljXB8Bjtvcg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
