<!DOCTYPE html>
<html>
    <head>
        <meta charset='utf-8'>
        <meta http-equiv='X-UA-Compatible' content='IE=edge'>
        <meta name='viewport' content='width=device-width, initial-scale=1'>

        <title>Namecard Write</title>

        <link th:href="@{/css/table-approver-line.css}" rel="stylesheet">
        <link th:href="@{/css/styles.css}" rel="stylesheet">
    </head>
    <body class="mt-4">
        <div class="container">
            <div class="card">
                <th:block th:replace="section/common/docs-header :: docs-header-section"></th:block>
            
                <div class="card-body">
                    <th:block th:replace="section/common/docs-title :: docs-title-section"></th:block>
                    <br>
            
                    <div class="form-row">
                        <label class="col-4 col-form-label" for="team">부서</label>
                        <label class="col-3 col-form-label" for="jobTitle">직위</label>
                        <label class="col-2 col-form-label" for="name">이름</label>
                        <label class="col-3 col-form-label" for="nameEng">영문</label>
                    </div>
                    <div class="form-row">
                        <div class="form-group col-4">
                            <input type="text" class="form-control text-center" id="team" th:value="${myInfo.team}" autocomplete="off">
                        </div>
                        <div class="form-group col-3">
                            <input type="text" class="form-control text-center" id="jobTitle" th:value="${myInfo.jobTitle}" autocomplete="off">
                        </div>
                        <div class="form-group col-2">
                            <input type="text" class="form-control text-center" id="name" th:value="${myInfo.name}" autocomplete="off">
                        </div>
                        <div class="form-group col-3">
                            <input type="text" class="form-control text-center" id="nameEng" th:value="${myInfo.nameEng}" autocomplete="off">
                        </div>
                    </div>
                    <div class="form-row">
                        <label class="col-4 col-form-label" for="mobile">모바일</label>
                        <label class="col-3 col-form-label" for="tel">내선</label>
                        <label class="col-5 col-form-label" for="mail">메일</label>
                    </div>
                    <div class="form-row">
                        <div class="form-group col-4">
                            <input type="text" class="form-control text-center" id="mobile" th:value="${myInfo.mobileNo}" autocomplete="off">
                        </div>
                        <div class="form-group col-3">
                            <input type="text" class="form-control text-center" id="tel" th:value="${myInfo.tel}" autocomplete="off">
                        </div>
                        <div class="form-group col-5">
                            <input type="text" class="form-control text-center" id="mail" th:value="${myInfo.mailAddress}" autocomplete="off">
                        </div>
                    </div>
                    
                    <br>

                    <div class="form-row">
                        <div class="form-group col-12">
                            <textarea class="form-control" rows="4" id="content" placeholder="기타 사항이 있는 경우 작성하세요."></textarea>
                        </div>
                    </div>

                    <br>
                    <th:block th:replace="section/common/docs-attachments :: docs-attachments-section"></th:block>
                </div>
            </div>
            
            <th:block th:replace="section/approval/approval-line-button :: approval-line-button-section"></th:block>

            <th:block th:replace="section/approval/approval-line-table :: approval-line-section"></th:block>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.slim.min.js" integrity="sha512-6ORWJX/LrnSjBzwefdNUyLCMTIsGoNP6NftMy2UAm1JBm6PRZCO1d7OHBStWpVFZLO+RerTvqX/Z9mBFfCJZ4A==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/js/all.min.js" integrity="sha512-Tn2m0TIpgVyTzzvmxLNuqbSJH3JP8jm+Cy3hvHrW7ndTDcJ1w5mBiksqDBb8GpE2ksktFvDB/ykZ0mDpsZj20w==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.6.0/js/bootstrap.bundle.min.js" integrity="sha512-wV7Yj1alIZDqZFCUQJy85VN+qvEIly93fIQAN7iqDFCPEucLCeNFz4r35FCo9s6WrpdDQPi80xbljXB8Bjtvcg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

        <script th:src="@{/js/common/fetch-custom.js}"></script>
        <script th:src="@{/js/common/attachements.js}"></script>
        <script th:src="@{/js/common/open-popup.js}"></script>

        <script th:src="@{/js/approval/common/line-table.js}"></script>
        
        <script th:src="@{/js/approval/common-sublist/sublist-write.js}"></script>
        <script th:src="@{/js/approval/namecard/namecard-write.js}"></script>
    </body>
</html>
