<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <!-- 이 템플릿을 사용할 때 /js/common/document-write.js, /js/common/attachments.js 를 추가할 것. -->
    <th:block th:fragment="docs-attachments-section">
        
        <div class="form-row mt-4">
            <div class="form-group col-6">
                <div class="input-group">
                    <div class="custom-file">
                        <input type="file" class="custom-file-input" accept="*/*" multiple="multiple" id="attachmentsInput" onchange="appendSelectedFiles()">
                        <label class="custom-file-label" for="attachmentsInput">첨부파일은 여기를 클릭하세요.</label>
                    </div>
                    <div class="input-group-append">
                        <button class="btn btn-outline-secondary" type="button" onclick="selectedFilesRestore()">Restore</button>
                    </div>
                </div>
            </div>

            <div class="form-group col-6">
                <div class="float-right">
                    <button class="btn btn-outline-info mr-2" type="button" id="btnTempSave"><i class="fas fa-paste mr-2"></i>임시저장</button>
                    <button class="btn btn-outline-success" type="button" id="btnInsert"><i class="fas fa-file-upload mr-2"></i>등록</button>
                </div>
            </div>
        </div>

        <div class="form-row">
            <label class="col-6 col-form-label col-form-label-sm text-muted">파일은 개당 50MB까지 업로드 할 수 있습니다.</label>
            <label class="col-6 col-form-label col-form-label-sm text-muted text-right">임시저장시 첨부파일은 저장되지 않습니다.</label>
        </div>

        <div class="form-row">
            <div class="form-group col-6">
                <table class="table table-sm table-hover">
                    <thead>
                        <tr class="text-center">
                            <th>#</th>
                            <th>파일명</th>
                            <th>크기(MB)</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="attachmentsList"></tbody>
                </table>
            </div>
        </div>

    </th:block>
</html>
