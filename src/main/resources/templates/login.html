<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        
        <title>Login</title>
        
        <link th:href="@{/css/styles.css}" rel="stylesheet" />
        <link th:href="@{/css/login.css}" rel="stylesheet" />
    </head>
    <body>
        <div id="layoutAuthentication">
            <div id="layoutAuthentication_content">
                <main>
                    <div class="container-fluid">
                        <div class="row d-flex justify-content-center align-items-center">
                            <div class="card shadow-lg border-0 rounded-lg">
                                <div class="card-header"><h4 class="text-center text-info">Simple GW</h4></div>
                                <div class="card-body">
                                    <form action="login" method="post">
                                        <div class="input-group mb-2">
                                            <div class="input-group-prepend">
                                                <span class="input-group-text justify-content-center"><i class="fas fa-user"></i></span>
                                            </div>
                                            <input type="text" class="form-control text-center" name="userId" autocomplete="off">
                                        </div>

                                        <div class="input-group mb-2">
                                            <div class="input-group-prepend">
                                                <span class="input-group-text justify-content-center"><i class="fas fa-key"></i></span>
                                            </div>
                                            <input type="password" class="form-control text-center" name="userPw" onkeyup="checkCapsLock(event)">
                                        </div>
                                        <br>
                                        <input class="btn btn-outline-info btn-block" type="submit" value="Login">
                                    </form>
                                </div>
                                <div class="card-footer">
                                    <pre class="text-warning text-center" th:if="${errorMsg}" th:text="${errorMsg}"></pre>
                                    <pre class="text-warning text-center" id="capslockMsg"></pre>
                                </div>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.slim.min.js" integrity="sha512-6ORWJX/LrnSjBzwefdNUyLCMTIsGoNP6NftMy2UAm1JBm6PRZCO1d7OHBStWpVFZLO+RerTvqX/Z9mBFfCJZ4A==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/js/all.min.js" integrity="sha512-Tn2m0TIpgVyTzzvmxLNuqbSJH3JP8jm+Cy3hvHrW7ndTDcJ1w5mBiksqDBb8GpE2ksktFvDB/ykZ0mDpsZj20w==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.6.0/js/bootstrap.bundle.min.js" integrity="sha512-wV7Yj1alIZDqZFCUQJy85VN+qvEIly93fIQAN7iqDFCPEucLCeNFz4r35FCo9s6WrpdDQPi80xbljXB8Bjtvcg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        <script th:src="@{/js/login/login.js}"></script>
    </body>
</html>
